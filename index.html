<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RATIO | Distributed P2P Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0e14;
            --accent: #667eea;
            --accent-glow: rgba(102, 126, 234, 0.4);
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(102, 126, 234, 0.15) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(118, 75, 162, 0.15) 0, transparent 50%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            overflow-x: hidden;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
            letter-spacing: -3px;
        }

        .header p {
            font-size: 1.1rem;
            color: #888;
            letter-spacing: 5px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }

        .stat-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-item {
            flex: 1;
            padding: 15px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            text-align: center;
        }

        .stat-item span {
            display: block;
            font-size: 0.7rem;
            color: #666;
            text-transform: uppercase;
        }

        .stat-item b {
            font-size: 1.1rem;
            color: var(--accent);
        }

        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.2rem;
            color: white;
            font-family: inherit;
            font-size: 1.1rem;
            margin-bottom: 15px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.08);
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1.2rem;
            font-weight: 900;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px var(--accent-glow);
        }

        button:active { transform: translateY(0); }

        button:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
            transform: none;
        }

        #status {
            padding: 15px;
            border-radius: 12px;
            background: rgba(0, 184, 148, 0.1);
            border: 1px solid #00b894;
            color: #00b894;
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            display: none;
        }

        #error-node {
            padding: 15px;
            border-radius: 12px;
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid #ff4757;
            color: #ff4757;
            text-align: center;
            margin-bottom: 25px;
            display: none;
        }

        #battle-arena {
            margin-top: 3rem;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .battle-card {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 1.8rem;
            animation: fadeIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .battle-card.model-a { border-left: 5px solid var(--accent); }
        .battle-card.model-b { border-left: 5px solid #ff6b35; }

        .battle-card .label {
            font-weight: 900;
            font-size: 0.8rem;
            margin-bottom: 12px;
            display: block;
            opacity: 0.6;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .loader {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="header">
        <h1>RATIO</h1>
        <p>Decentralized Edge Node v3.5</p>
    </div>

    <div class="container">
        <div class="glass-card">
            <div id="error-node"></div>
            <div id="status"></div>
            
            <div class="stat-bar">
                <div class="stat-item"><span>Status</span><b id="node-health">WAITING</b></div>
                <div class="stat-item"><span>Hardware</span><b id="hw-accel">DETECTING...</b></div>
                <div class="stat-item"><span>Node Latency</span><b>0.00ms</b></div>
            </div>

            <input type="text" id="topic" placeholder="e.g. Is decentralized AI the ultimate sovereign technology?" value="Why should everyone own their AI model locally?">
            <button id="activate-btn">ACTIVATE PROTOCOL</button>
        </div>

        <div id="battle-arena"></div>
    </div>

    <script type="module">
        import * as webllm from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm/+esm";

        const btn = document.getElementById("activate-btn");
        const status = document.getElementById("status");
        const errorNode = document.getElementById("error-node");
        const arena = document.getElementById("battle-arena");
        const hwLabel = document.getElementById("hw-accel");

        // 🛡️ WebGPU Compatibility Check
        async function checkHW() {
            if ("gpu" in navigator) {
                const adapter = await navigator.gpu.requestAdapter();
                if (adapter) {
                    hwLabel.textContent = "WEBGPU ✅";
                    return true;
                }
            }
            hwLabel.textContent = "CPU ONLY ❌";
            errorNode.style.display = "block";
            errorNode.innerHTML = "<b>Hardware Acceleration Missing:</b> Please use Chrome, Edge, or Safari and ensure WebGPU is enabled.";
            return false;
        }
        checkHW();

        function addCard(model, text) {
            const card = document.createElement("div");
            card.className = `battle-card model-${model.toLowerCase().includes('a') ? 'a' : 'b'}`;
            card.innerHTML = `<span class="label">🔵 MODEL ${model} | EDGE COMPUTE</span>${text}`;
            arena.appendChild(card);
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        btn.onclick = async () => {
            const topic = document.getElementById("topic").value;
            if (topic.length < 5) return;

            btn.disabled = true;
            status.style.display = "block";
            status.innerHTML = `<div class="loader"></div> HANDSHAKING WITH MODEL AGENTS...`;
            arena.innerHTML = "";
            document.getElementById("node-health").textContent = "SYNCING";

            try {
                const engine = await webllm.CreateMLCEngine(
                    "Llama-3.2-1B-Instruct-q4f16_1-MLC",
                    { initProgressCallback: (p) => {
                        status.innerHTML = `<div class="loader"></div> NODE SYNCHRONIZATION: ${Math.round(p.progress * 100)}%`;
                    } }
                );

                status.innerHTML = "⚔️ RATIOCINATION PROTOCOL ACTIVE";
                document.getElementById("node-health").textContent = "ACTIVE";
                
                let history = [];
                for (let r = 1; r <= 3; r++) {
                    // AI-A
                    const pA = r === 1 ? `Topic: ${topic}. Give a strong 2-sentence opening.` : `Finalize argument: ${history[history.length-1]}`;
                    const rA = await engine.chat.completions.create({ messages: [{ role: "user", content: pA }], max_tokens: 150 });
                    const mA = rA.choices[0].message.content;
                    addCard("A", mA);
                    history.push(mA);

                    if (r === 3) break;

                    // AI-B
                    const pB = `Counter: ${mA}`;
                    const rB = await engine.chat.completions.create({ messages: [{ role: "user", content: pB }], max_tokens: 150 });
                    const mB = rB.choices[0].message.content;
                    addCard("B", mB);
                    history.push(mB);
                }

                status.innerHTML = "✅ DECENTRALIZED CYCLE COMPLETED";
                document.getElementById("node-health").textContent = "IDLE";
                btn.textContent = "EXECUTE NEXT CYCLE";
                btn.disabled = false;

            } catch (e) {
                errorNode.style.display = "block";
                errorNode.textContent = `CRITICAL: ${e.message}`;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
