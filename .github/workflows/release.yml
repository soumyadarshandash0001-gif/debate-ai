name: Release & Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    name: Build Release
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Extract version from tag
        id: tag_name
        run: |
          echo "current_version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
      
      - name: Build release notes
        id: release_notes
        run: |
          echo "**Release: ${{ steps.tag_name.outputs.tag }}" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Changes" >> RELEASE_NOTES.md
          echo "See CHANGELOG.md for detailed changes" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "## Installation" >> RELEASE_NOTES.md
          echo "\`\`\`bash" >> RELEASE_NOTES.md
          echo "git clone https://github.com/soumyadarshandash/trillm-arena.git" >> RELEASE_NOTES.md
          echo "cd trillm-arena" >> RELEASE_NOTES.md
          echo "git checkout ${{ steps.tag_name.outputs.tag }}" >> RELEASE_NOTES.md
          echo "docker-compose up -d" >> RELEASE_NOTES.md
          echo "\`\`\`" >> RELEASE_NOTES.md
      
      - name: Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag_name.outputs.tag }}
          release_name: Release ${{ steps.tag_name.outputs.tag }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/trillm-arena:latest
            ${{ secrets.DOCKER_USERNAME }}/trillm-arena:${{ steps.tag_name.outputs.current_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # PyPI Release (if applicable)
  publish-pypi:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel twine
      
      - name: Build distribution
        run: python -m build
      
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # Notify deployment
  notify-deployment:
    runs-on: ubuntu-latest
    name: Notify Deployment
    needs: [build-and-release, publish-pypi]
    if: always()
    
    steps:
      - name: Release Complete
        run: |
          echo "✅ Release ${{ github.ref }} published successfully!"
          echo "Repository: https://github.com/soumyadarshandash/trillm-arena"
          echo "Release: https://github.com/soumyadarshandash/trillm-arena/releases/tag/${{ github.ref_name }}"
